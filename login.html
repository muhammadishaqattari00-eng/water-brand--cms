<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Water Brand CMS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #0d0d0d;
  --bg2:     #161616;
  --bg3:     #1e1e1e;
  --border:  #2a2a2a;
  --border2: #333;
  --text:    #f0f0f0;
  --text2:   #aaa;
  --text3:   #666;
  --green:   #1D9E75;
  --red:     #e24b4a;
  --radius:  12px;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-wrap {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo-icon {
  font-size: 48px;
  display: block;
  margin-bottom: 10px;
}

.logo-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--green);
}

.logo-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 4px;
}

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.card-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 24px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 16px;
}

.field label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field input {
  padding: 12px 14px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--bg3);
  color: var(--text);
  font-size: 14px;
  font-family: Arial, sans-serif;
  transition: border-color 0.15s;
}

.field input:focus {
  outline: none;
  border-color: var(--green);
}

.field input.error {
  border-color: var(--red);
}

.error-msg {
  font-size: 12px;
  color: var(--red);
  margin-top: -10px;
  margin-bottom: 10px;
  display: none;
}

.error-msg.show { display: block; }

.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: Arial, sans-serif;
  transition: opacity 0.15s, transform 0.1s;
  margin-top: 4px;
}

.btn-login:hover   { opacity: 0.85; }
.btn-login:active  { transform: scale(0.98); }

.shake {
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-5px); }
  80%      { transform: translateX(5px); }
}

.footer-note {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  margin-top: 20px;
}

.attempts-left {
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  margin-top: 10px;
  display: none;
}

.locked-msg {
  background: #3d1010;
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: #ff6b6b;
  text-align: center;
  display: none;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<div class="login-wrap">

  <div class="logo">
    <span class="logo-icon">💧</span>
    <div class="logo-title" id="brand-display">AquaCMS</div>
    <div class="logo-sub">Water Brand Manager</div>
  </div>

  <div class="card">
    <div class="card-title">Owner Login</div>
    <div class="card-sub">Enter your password to access the CMS</div>

    <div class="locked-msg" id="locked-msg">
      🔒 Too many wrong attempts. Please wait <span id="countdown">30</span> seconds.
    </div>

    <div class="field">
      <label>Password</label>
      <input
        type="password"
        id="password"
        placeholder="Enter password"
        onkeydown="if(event.key==='Enter')tryLogin()"
        autocomplete="current-password"
      >
    </div>

    <div class="error-msg" id="error-msg">❌ Wrong password. Please try again.</div>

    <button class="btn-login" id="login-btn" onclick="tryLogin()">
      Login →
    </button>

    <div class="attempts-left" id="attempts-left"></div>
  </div>

  <div class="footer-note">Forgot password? Change it in Settings after login.</div>

</div>

<script>
/* ── Config ── */
const DEFAULT_PASSWORD = 'water123';
const MAX_ATTEMPTS     = 5;
const LOCKOUT_SECONDS  = 30;

/* ── Load settings ── */
const settings = JSON.parse(localStorage.getItem('wbm-settings')) || {};
if (settings.brand) {
  document.getElementById('brand-display').textContent = '💧 ' + settings.brand;
}

/* ── Already logged in? ── */
if (sessionStorage.getItem('wbm-auth') === 'true') {
  window.location.href = 'index.html';
}

/* ── State ── */
let attempts = parseInt(localStorage.getItem('wbm-attempts') || '0');
let lockedUntil = parseInt(localStorage.getItem('wbm-locked-until') || '0');

checkLock();

function checkLock() {
  const now = Date.now();
  if (lockedUntil > now) {
    showLock(Math.ceil((lockedUntil - now) / 1000));
    return true;
  }
  return false;
}

function showLock(seconds) {
  document.getElementById('locked-msg').style.display = 'block';
  document.getElementById('login-btn').disabled = true;
  document.getElementById('login-btn').style.opacity = '0.5';
  document.getElementById('password').disabled = true;

  const cd = document.getElementById('countdown');
  cd.textContent = seconds;

  const interval = setInterval(() => {
    seconds--;
    cd.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(interval);
      document.getElementById('locked-msg').style.display = 'none';
      document.getElementById('login-btn').disabled = false;
      document.getElementById('login-btn').style.opacity = '1';
      document.getElementById('password').disabled = false;
      attempts = 0;
      localStorage.setItem('wbm-attempts', '0');
      localStorage.removeItem('wbm-locked-until');
    }
  }, 1000);
}

function tryLogin() {
  if (checkLock()) return;

  const input    = document.getElementById('password');
  const errorMsg = document.getElementById('error-msg');
  const attLeft  = document.getElementById('attempts-left');
  const card     = document.querySelector('.card');

  const savedPassword = localStorage.getItem('wbm-password') || DEFAULT_PASSWORD;
  const entered       = input.value;

  if (!entered) {
    input.classList.add('error');
    input.focus();
    return;
  }

  if (entered === savedPassword) {
    /* ✅ Correct */
    sessionStorage.setItem('wbm-auth', 'true');
    localStorage.setItem('wbm-attempts', '0');
    document.getElementById('login-btn').textContent = '✅ Logging in...';
    setTimeout(() => { window.location.href = 'index.html'; }, 400);
  } else {
    /* ❌ Wrong */
    attempts++;
    localStorage.setItem('wbm-attempts', attempts);
    input.value = '';
    input.classList.add('error');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);

    const remaining = MAX_ATTEMPTS - attempts;

    if (attempts >= MAX_ATTEMPTS) {
      const lockUntil = Date.now() + LOCKOUT_SECONDS * 1000;
      localStorage.setItem('wbm-locked-until', lockUntil);
      attLeft.style.display = 'none';
      errorMsg.classList.remove('show');
      showLock(LOCKOUT_SECONDS);
    } else {
      errorMsg.classList.add('show');
      attLeft.style.display = 'block';
      attLeft.textContent   = `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining before lockout`;
    }
  }
}

document.getElementById('password').addEventListener('input', function () {
  this.classList.remove('error');
  document.getElementById('error-msg').classList.remove('show');
});
</script>
</body>
</html>
